name: Deploy website to FTP

on:
  push:
    branches:
      - main
    paths:
      - index.html
      - zomerfeest.html
      - .htaccess
      - assets/**
      - script.js
      - styles.css
  workflow_dispatch:

jobs:
  deploy:
    name: Upload website files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install FTP client
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload website files
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          test -n "$FTP_HOST"
          test -n "$FTP_USERNAME"
          test -n "$FTP_PASSWORD"
          test -n "$FTP_REMOTE_DIR"

          REMOTE_DIR="${FTP_REMOTE_DIR%\"}"
          REMOTE_DIR="${REMOTE_DIR#\"}"
          REMOTE_DIR="${REMOTE_DIR%\'}"
          REMOTE_DIR="${REMOTE_DIR#\'}"
          REMOTE_DIR="${REMOTE_DIR%/}"

          echo "Login to: $FTP_HOST"
          echo "Uploading website files to remote directory: $REMOTE_DIR"

          lftp \
            -u "$FTP_USERNAME","$FTP_PASSWORD" \
            "$FTP_HOST" \
            -e "
              set ftp:ssl-allow true;
              set ssl:verify-certificate false;
              cd $REMOTE_DIR;
              pwd;
              put index.html -o index.html;
              put zomerfeest.html -o zomerfeest.html;
              put .htaccess -o .htaccess;
              mirror -R assets assets;
              put script.js -o script.js;
              put styles.css -o styles.css;
              cls -l;
              bye;
            "

          echo "Uploaded website files to $FTP_HOST:$REMOTE_DIR"
